<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chánh Tâm w Tbh - Kỷ Niệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="pb-32">

    <!-- Floating Background Icons -->
    <div class="floating-icons-container" id="floating-icons"></div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col items-center">
            <h1 class="text-3xl md:text-4xl font-extrabold text-blue-700 mb-4 tracking-tight">Chánh Tâm w Tbh</h1>
            <div class="flex space-x-2 bg-blue-50 p-1.5 rounded-full border border-blue-100">
                <button onclick="switchTab('gallery')" id="btn-gallery" class="tab-btn px-8 py-2.5 rounded-full font-semibold transition-all bg-blue-600 text-white shadow-md">
                    <i class="fas fa-images mr-2"></i>
                </button>
                <button onclick="switchTab('timeline')" id="btn-timeline" class="tab-btn px-8 py-2.5 rounded-full font-semibold transition-all text-blue-600 hover:bg-blue-100">
                    <i class="fas fa-history mr-2"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <!-- TAB 1: GALLERY -->
        <section id="gallery" class="tab-content active">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="gallery-container"></div>
            <div id="loader" class="py-12 text-center text-blue-400">
                <i class="fas fa-circle-notch fa-spin text-2xl"></i>
            </div>
        </section>

        <!-- TAB 2: TIMELINE -->
        <section id="timeline" class="tab-content">
            <div class="max-w-4xl mx-auto relative ml-4 py-4">
                <div class="timeline-line"></div>
                <div id="timeline-container" class="space-y-12"></div>
            </div>
        </section>
    </main>

    <!-- LIGHTBOX (Trình xem ảnh) -->
    <div id="lightbox" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white text-3xl"><i class="fas fa-times"></i></button>
        <button onclick="event.stopPropagation(); prevImage()" class="absolute left-4 top-1/2 -translate-y-1/2 text-white bg-black/20 hover:bg-black/50 p-4 rounded-full transition">
            <i class="fas fa-chevron-left text-2xl"></i>
        </button>
        <img id="lightbox-img" src="" alt="Zoomed view" onclick="event.stopPropagation()">
        <button onclick="event.stopPropagation(); nextImage()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white bg-black/20 hover:bg-black/50 p-4 rounded-full transition">
            <i class="fas fa-chevron-right text-2xl"></i>
        </button>
        <div id="lightbox-caption" class="text-white mt-6 px-4 text-center">
            <p id="caption-title" class="font-bold text-xl mb-1"></p>
            <p id="caption-date" class="text-blue-300 text-sm mb-2"></p>
            <p id="caption-index" class="text-xs text-gray-400 italic"></p>
        </div>
    </div>

    <!-- TRÌNH PHÁT NHẠC -->
    <div class="music-player-container">
        <div class="flex items-center space-x-3 mb-3">
            <button onclick="changeTrack(-1)" class="w-8 h-8 bg-white border border-blue-100 text-blue-600 rounded-full shadow-sm flex items-center justify-center hover:bg-blue-50 active:scale-90 transition">
                <i class="fas fa-step-backward text-xs"></i>
            </button>
            <button onclick="toggleMusic()" id="music-btn" class="music-btn-main active:scale-95">
                <i id="music-icon" class="fas fa-play text-lg ml-1"></i>
            </button>
            <button onclick="changeTrack(1)" class="w-8 h-8 bg-white border border-blue-100 text-blue-600 rounded-full shadow-sm flex items-center justify-center hover:bg-blue-50 active:scale-90 transition">
                <i class="fas fa-step-forward text-xs"></i>
            </button>
        </div>
        <div class="bg-white/90 backdrop-blur shadow-md border border-blue-50 rounded-lg py-1.5 px-3 w-full overflow-hidden">
            <span id="track-name" class="block whitespace-nowrap overflow-hidden text-ellipsis text-[10px] font-bold text-blue-700 uppercase text-center">Đang dừng</span>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source id="audio-source" src="" type="audio/mpeg">
    </audio>

    <script src="./js/scripts.js"></script>
</body>
</html>
